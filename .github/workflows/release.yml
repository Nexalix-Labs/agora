name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nexalix Agora ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false

      # Хеши артефактов + человеческие release notes.
      # Текст берётся из аннотации тега; lightweight-тег -> заголовок по версии.
      - name: Checksums and release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $dir = "src-tauri/target/release/bundle/nsis"
          $lines = Get-ChildItem $dir -File | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name
          }
          Set-Content checksums.txt ($lines -join "`n")
          gh release upload $env:TAG checksums.txt --clobber
          # Стабильно-именованная копия — для прямой ссылки
          # releases/latest/download/nexalix-agora-setup.exe (не зависит от версии).
          $setup = Get-ChildItem $dir -Filter "*_x64-setup.exe" | Select-Object -First 1
          if ($setup) {
            Copy-Item $setup.FullName "nexalix-agora-setup.exe"
            gh release upload $env:TAG "nexalix-agora-setup.exe" --clobber
          }
          $ver = $env:TAG.TrimStart("v")
          $notes = (git tag -l --format='%(contents)' $env:TAG | Out-String).Trim()
          if (-not $notes -or $notes -eq "") { $notes = "Nexalix Agora $ver" }
          $fence = '```'
          $body = @(
            $notes,
            "",
            "## Install",
            "",
            "Download **Nexalix Agora_${ver}_x64-setup.exe** below and run it (per-user, no admin). Installed copies update to this release automatically.",
            "",
            "## SHA-256",
            "",
            $fence,
            ($lines -join "`n"),
            $fence
          ) -join "`n"
          gh release edit $env:TAG --notes $body
